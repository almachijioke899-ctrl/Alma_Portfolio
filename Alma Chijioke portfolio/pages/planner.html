<!-- ================= HERO ================= -->

<section class="planner-hero">

<h1>Academic Task Planner</h1>

<p>

Stay organized, manage your coursework,
and keep track of important deadlines.

</p>

</section>

<!-- ================= DASHBOARD ================= -->

<section class="dashboard">

<div class="stat-card">

<h2 id="totalTasks">0</h2>

<p>Total Tasks</p>

</div>

<div class="stat-card">

<h2 id="pendingTasks">0</h2>

<p>Pending</p>

</div>

<div class="stat-card">

<h2 id="completedTasks">0</h2>

<p>Completed</p>

</div>

</section>

<!-- ================= TASK FORM ================= -->

<section class="task-form">

<h2>Add New Task</h2>

<form id="plannerForm">

<input
type="text"
id="taskTitle"
placeholder="Task Title"
required>

<input
type="text"
id="courseCode"
placeholder="Course Code (COS106)"
required>

<input
type="date"
id="dueDate"
required>

<select id="priority">

<option>High</option>

<option>Medium</option>

<option>Low</option>

</select>

<button type="submit">

<i class="fas fa-plus"></i>

Add Task

</button>

</form>

</section>

<!-- ================= SEARCH ================= -->

<section class="search-section">

<input

type="text"

id="search"

placeholder="Search tasks...">

</section>

<!-- ================= FILTERS ================= -->

<section class="filters">

<button class="filter active"
data-filter="all">

All

</button>

<button class="filter"
data-filter="pending">

Pending

</button>

<button class="filter"
data-filter="completed">

Completed

</button>

</section>

<!-- ================= TASK LIST ================= -->

<section>

<div id="taskList"></div>

</section>
